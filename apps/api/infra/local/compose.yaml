name: visual-pipeline-api

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: visual_pipeline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - visual-pipeline-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visual_pipeline -d visual_pipeline"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  visual-pipeline-postgres:
