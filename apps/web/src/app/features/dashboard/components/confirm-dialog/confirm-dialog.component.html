<div class="dialog-backdrop" (click)="closed.emit()"></div>
<section class="dialog" role="alertdialog" aria-modal="true">
  <h2>{{ title }}</h2>
  <p>{{ message }}</p>
  <div>
    <button type="button" (click)="closed.emit()">Cancel</button>
    <button type="button" class="danger" (click)="confirmed.emit()">{{ confirmLabel }}</button>
  </div>
</section>
