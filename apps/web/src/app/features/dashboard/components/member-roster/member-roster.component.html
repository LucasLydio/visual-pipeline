<section class="panel">
  <header>
    <div>
      <span class="section-label">Members</span>
      <h2>Team roles</h2>
    </div>
    <span>{{ members.length }}</span>
  </header>

  <div class="member-list">
    @for (member of members; track member.id) {
      <article>
        <div class="avatar" aria-hidden="true">{{ member.name.slice(0, 2).toUpperCase() }}</div>
        <div>
          <strong>{{ member.name }}</strong>
          <small>{{ member.title || 'No title assigned' }} - {{ member.role }}</small>
          <small>{{ member.email }}</small>
        </div>
        <div class="member-actions">
          <button type="button" title="Edit member" (click)="editMember.emit(member)">
            <ng-icon name="lucidePencil" aria-hidden="true" />
          </button>
          <button
            type="button"
            title="Remove member"
            [disabled]="member.role === 'OWNER'"
            (click)="removeMember.emit(member)"
          >
            <ng-icon name="lucideTrash2" aria-hidden="true" />
          </button>
        </div>
      </article>
    } @empty {
      <p class="empty-copy">Add members to keep ownership visible.</p>
    }
  </div>
</section>
